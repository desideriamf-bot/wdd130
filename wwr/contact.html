<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us | White Water Rafting Adventures</title>
    <meta name="description"
        content="Contact White Water Rafting Adventures for reservations, questions, or more information about our rafting experiences.">
    <meta name="author" content="Desideriam Fernandez Garcia de Chandias">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <div class="logo">
            <img src="images/wwr-rafting.jpg" alt="White Water Rafting Company Logo">
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="business-info">
            <h1>Contact White Water Rafting Adventures</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="map-form">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3187.4469622817846!2d-122.0243174!3d36.975263000000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808e4026633df9e3%3A0x7948909fb68b206c!2s123%20River%20St%20S%2C%20Santa%20Cruz%2C%20CA%2095060!5e0!3m2!1ses-419!2sus!4v1775527338539!5m2!1ses-419!2sus"
                    width="600" height="450" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="form-group">
                    <span>Message Purpose</span>

                    <div>
                        <label>
                            <input type="radio" id="general" name="purpose" value="general">
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" id="reservation" name="purpose" value="general">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </div>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <label>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-container">

                <figure>
                    <img src="images/guide.jpg" alt="River Guide">
                    <figcaption>River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/instructor.jpg" alt="Safety Instructor">
                    <figcaption>Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/coordinator.jpg" alt="Trip Coordinator">
                    <figcaption>Trip Coordinator</figcaption>
                </figure>

            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 White Water Rafting Adventures | Desideriam F. Garcia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.com.png" alt="Facebook"></a>
            <a href="https://twitter.com">
                <img src="images/twitter-icon.png" alt="Twitter"></a>
            <a href="https://instagram.com">
                <img src="images/instagram-icon.jpg" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
